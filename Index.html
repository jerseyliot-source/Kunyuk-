<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Prom Audio</title>
  <style>
    body {
      background-color: black; /* background hitam */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🎵 Prom Audio 🎵</h1>
  
  <!-- Audio player -->
  <audio id="myAudio" controls>
    <source src="desah.mp3" type="audio/mpeg">
    Browser kamu tidak support audio.
  </audio>

  <!-- Tombol play/pause -->
  <button onclick="toggleAudio()">Play / Pause</button>

  <script>
    const audio = document.getElementById("myAudio");
    function toggleAudio() {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }
  </script>

</body>
</html>
